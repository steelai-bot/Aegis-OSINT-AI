services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AEGIS_ENVIRONMENT: container
      AEGIS_API_PREFIX: /api/v1
      AEGIS_DATABASE_URL: postgresql+asyncpg://aegis:aegis@db:5432/aegis
      AEGIS_LLM_PROVIDER: disabled
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AEGIS_API_URL: http://localhost:8000
        NEXT_PUBLIC_AEGIS_WS_URL: ws://localhost:8000/api/v1/events
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
